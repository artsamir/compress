<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cutcompress{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='images/logo-images/logo-len1-trans.png') }}" alt="Cutcompress">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('tools') }}">Tools</a></li>
            <li><a href="{{ url_for('blog') }}">Blog</a></li>
            <li><a href="{{ url_for('about') }}">About Me</a></li>
            <!-- Auth button will show here in mobile view -->
            <li class="auth-button mobile-only">
                <a href="{{ url_for('signup') }}">Sign Up</a>
            </li>
        </ul>
        <!-- Auth button for desktop view -->
        <div class="auth-button desktop-only">
            <a href="{{ url_for('signup') }}">Sign Up</a>
        </div>
        <button class="nav-toggle">
            <span class="hamburger"></span>
        </button>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
